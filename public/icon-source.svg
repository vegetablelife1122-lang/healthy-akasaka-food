<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="r"><rect width="512" height="512" rx="102"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a3d2e"/>
      <stop offset="50%" stop-color="#0f2419"/>
      <stop offset="100%" stop-color="#071510"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a656" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a656" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a656" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a656" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c9a656" stop-opacity="1"/>
      <stop offset="70%" stop-color="#c9a656" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a656" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#r)">
    <!-- 背景グラデーション -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- 微妙なテクスチャライン -->
    <line x1="0" y1="180" x2="512" y2="180" stroke="#c9a656" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="0" y1="332" x2="512" y2="332" stroke="#c9a656" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- 金L字フレーム -->
    <g stroke="#c9a656" stroke-width="4" fill="none" stroke-linecap="square" opacity="0.9">
      <path d="M 60 108 L 60 60 L 108 60"/>
      <path d="M 404 60 L 452 60 L 452 108"/>
      <path d="M 60 404 L 60 452 L 108 452"/>
      <path d="M 404 452 L 452 452 L 452 404"/>
    </g>
    <!-- 上部装飾ライン -->
    <rect x="156" y="148" width="200" height="1.5" rx="0.75" fill="url(#line)" opacity="0.6"/>
    <!-- 赤坂テキスト -->
    <text x="256" y="258"
      text-anchor="middle" dominant-baseline="central"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="148" font-weight="400" fill="#faf6ec"
      style="paint-order:stroke; stroke:rgba(0,0,0,0.5); stroke-width:2px;">赤坂</text>
    <!-- 下部装飾ライン -->
    <rect x="156" y="322" width="200" height="1.5" rx="0.75" fill="url(#line)" opacity="0.6"/>
    <!-- 外食決定機テキスト -->
    <text x="256" y="368"
      text-anchor="middle" dominant-baseline="central"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="36" font-weight="400" fill="#faf6ec" letter-spacing="6"
      style="paint-order:stroke; stroke:rgba(0,0,0,0.4); stroke-width:1px;">外食決定機</text>
    <!-- AKASAKAテキスト -->
    <text x="256" y="410"
      text-anchor="middle" dominant-baseline="central"
      font-family="Georgia,serif"
      font-size="24" font-weight="400" fill="#c9a656" font-style="italic"
      letter-spacing="8">AKASAKA</text>
  </g>
</svg>
